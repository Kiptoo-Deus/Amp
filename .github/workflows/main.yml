name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering from GitHub UI
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight (UTC)

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          # Optionally, install a specific version of CMake
          # wget https://github.com/Kitware/CMake/releases/download/v3.15.0/cmake-3.15.0-Linux-x86_64.tar.gz
          # sudo tar -xzf cmake-3.15.0-Linux-x86_64.tar.gz -C /usr/local --strip-components=1

      - name: Install libtorch
        run: |
          sudo apt-get update
          sudo apt-get install -y libtorch-dev

      - name: Build project
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja ..
          cmake --build .

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install CMake
        run: |
          choco install cmake --version 3.15
          choco install ninja
          # Alternatively, manually download and install if needed
          # Invoke-WebRequest -Uri https://github.com/Kitware/CMake/releases/download/v3.15.0/cmake-3.15.0-win64-x64.msi -OutFile cmake.msi
          # Start-Process msiexec.exe -ArgumentList '/i cmake.msi /quiet' -NoNewWindow -Wait

      - name: Install libtorch
        run: |
          # Install libtorch manually or set up environment as needed
          echo "Install libtorch manually if needed"

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake -G Ninja ..
          cmake --build .

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

name: CI

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main # Trigger on pull requests to the main branch
  workflow_dispatch: # Allow manual triggering from GitHub UI
  schedule:
    - cron: '0 0 * * 1' # Run every Monday at midnight (UTC)

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up CMake
        uses: cmake/setup-cmake@v2
        with:
          cmake-version: '3.15'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtorch-dev

      - name: Build project
        run: |
          mkdir -p build
          cd build
          cmake ..
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up CMake
        uses: cmake/setup-cmake@v2
        with:
          cmake-version: '3.15'

      - name: Install dependencies
        run: |
          choco install cmake --version 3.15
          choco install visualstudio2022-workload-vctools
          # Install libtorch manually, or use a script to set it up

      - name: Build project
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022"
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure
